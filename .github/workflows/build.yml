name: Build AUR Packages

on:
  schedule:
    - cron: '0 4 * * *' # Runs every day at 4:00 AM UTC
  workflow_dispatch:   # Allows manual trigger via GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged # Required for certain pacman operations

    steps:
    - name: Initialize Arch Linux build environment
      run: |        
        # Install base-devel, git, and github-cli to manage releases
        pacman -Syu --noconfirm --needed base-devel git github-cli
        useradd -m builder
        echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
        
    - name: Checkout repository
      uses: actions/checkout@v6
      
    - name: Set Workspace Permissions
      run: |
        git config --global --add safe.directory "${{ github.workspace }}"
        chown -R builder:builder ./

    - name: Build Packages
      shell: bash
      env:
        WORKSPACE_DIR: ${{ github.workspace }}
      run: |
        mkdir -p /tmp/builds
        chown -R builder:builder /tmp/builds
        cd /tmp/builds

        # Quoting 'EOF' prevents GitHub Actions from preemptively expanding Bash variables
        sudo -u builder env WORKSPACE_DIR="$WORKSPACE_DIR" bash << 'EOF'
        PACKAGES=("google-chrome" "vivaldi")
        
        for pkg in "${PACKAGES[@]}"; do
          echo "========================================="
          echo "Building package: $pkg"
          echo "========================================="
          
          git clone "https://aur.archlinux.org/$pkg.git"
          cd "$pkg"
          
          # Sync dependencies, compile, and build package
          makepkg -s --noconfirm --needed
          
          # Safely check if the built package file exists before copying
          if ls *.pkg.tar.zst 1> /dev/null 2>&1; then
            cp *.pkg.tar.zst "$WORKSPACE_DIR/"
          else
            echo "Error: Build failed for $pkg"
            exit 1
          fi
          
          cd ..
        done
        EOF

    - name: Update Pacman Repository Database
      run: |
        # Check if we actually have packages to index
        if ls *.pkg.tar.zst 1> /dev/null 2>&1; then
          repo-add custom_repo.db.tar.zst *.pkg.tar.zst
          
          # GitHub Releases does not support symlinks. 
          # We replace the symlink with a duplicate of the real file.
          rm -f custom_repo.db
          cp custom_repo.db.tar.zst custom_repo.db
        else
          echo "No compiled packages found to add to the database."
          exit 1
        fi

    - name: Deploy Compiled Repo to GitHub Releases
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global --add safe.directory '*'
        
        # Create the release if it does not exist
        gh release create repository --title "Automated AUR Repository" --notes "Updated on $(date +'%Y-%m-%d')" --target main || echo "Release already exists"
        
        # Upload packages and the database file, overwriting old versions
        gh release upload repository *.pkg.tar.zst custom_repo.db --clobber
