name: Build AUR Packages

on:
  schedule:
    - cron: '0 4 * * *' # Runs every day at 4:00 AM UTC
  workflow_dispatch:   # Allows manual trigger via GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged # Required for certain pacman operations

    steps:
    - name: Initialize Arch Linux build environment
      run: |        
        # Install base-devel, git, and github-cli to manage releases
        pacman -Syu --noconfirm --needed base-devel git github-cli
        useradd -m builder
        echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
        
    - name: Checkout repository
      uses: actions/checkout@v6
      
    - name: Set Workspace Permissions
      run: |
        git config --global --add safe.directory "${{ github.workspace }}"
        chown -R builder:builder ./

    - name: Build Packages
      shell: bash
      env:
        WORKSPACE_DIR: ${{ github.workspace }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir -p /tmp/builds
        chown -R builder:builder /tmp/builds
        cd /tmp/builds

        sudo -u builder env WORKSPACE_DIR="$WORKSPACE_DIR" GITHUB_TOKEN="$GITHUB_TOKEN" bash << 'EOF'
        PACKAGES=("google-chrome" "anydesk-bin" "visual-studio-code-bin" "yay-bin" "python312")        

        EXISTING_ASSETS=$(gh release view repository --json assets --jq '.assets[].name' 2>/dev/null || true)
        
        for pkg in "${PACKAGES[@]}"; do
          echo "========================================="
          echo "Checking package: $pkg"
          echo "========================================="
          
          git clone "https://aur.archlinux.org/$pkg.git"
          cd "$pkg"
          
          # Determine the exact filename that this version would produce
          PKGFILES=$(makepkg --packagelist)
          
          ALL_EXIST=true
          for file in $PKGFILES; do
            bname=$(basename "$file")
            if ! echo "$EXISTING_ASSETS" | grep -qFx "$bname"; then
              ALL_EXIST=false
            fi
          done
          
          if [ "$ALL_EXIST" = true ]; then
            echo "Package $pkg is already up-to-date in the release. Skipping compilation."
          else
            echo "Package $pkg is outdated or missing. Compiling now..."
            makepkg -s --noconfirm --needed
            
            if ls *.pkg.tar.zst 1> /dev/null 2>&1; then
              cp *.pkg.tar.zst "$WORKSPACE_DIR/"
            else
              echo "Error: Build failed for $pkg"
              exit 1
            fi
          fi
          
          cd ..
        done
        EOF

    - name: Update Pacman Repository Database
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release download repository -p "custom_repo.db.tar.zst" || echo "No existing database found. Creating a fresh one."
        
        if ls *.pkg.tar.zst 1> /dev/null 2>&1; then
          repo-add custom_repo.db.tar.zst *.pkg.tar.zst
        fi
        
        if [ -f custom_repo.db.tar.zst ]; then
          rm -f custom_repo.db
          cp custom_repo.db.tar.zst custom_repo.db
        else
          echo "Error: Database metadata is missing."
          exit 1
        fi

    - name: Deploy Compiled Repo to GitHub Releases
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global --add safe.directory '*'

        gh release create repository --title "Automated AUR Repository" --notes "Updated on $(date +'%Y-%m-%d')" --target main || echo "Release target ready"
        
        # Only upload package binaries if new ones were actually compiled
        if ls *.pkg.tar.zst 1> /dev/null 2>&1; then
          gh release upload repository *.pkg.tar.zst --clobber
        fi
        
        # Always upload the updated database index layout mapping
        if [ -f custom_repo.db ]; then
          gh release upload repository custom_repo.db --clobber
        fi
