name: Build AUR Packages

on:
  schedule:
    - cron: '0 4 * * *' # Runs every day at 4:00 AM UTC
  workflow_dispatch:   # Allows you to click a button in GitHub UI to build manually

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged # Required for certain chroot/pacman operations

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize Arch Linux build environment
      run: |
        # Update package database and install base development tools + git
        pacman -Syu --noconfirm --needed base-devel git
        
        # Create a non-root user called 'builder' with passwordless sudo
        # (Arch Linux's makepkg strictly forbids running as root)
        useradd -m builder
        echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
        
        # Set ownership of the current workspace so the builder can write to it
        chown -R builder:builder ./

    - name: Build Packages
      shell: bash
      run: |
        # Define the AUR packages you want to track and build
        PACKAGES=("google-chrome" "vivaldi" "visual-studio-code-bin" "python312")
        
        # Move to a temporary location outside the main repo to handle the raw source compilation
        mkdir -p /tmp/builds
        chown -R builder:builder /tmp/builds
        cd /tmp/builds

        # Execute as the non-root builder user
        sudo -u builder bash <<EOF
        for pkg in "${PACKAGES[@]}"; do
          echo "========================================="
          echo "Building package: \$pkg"
          echo "========================================="
          
          git clone https://aur.archlinux.org/$pkg.git
          cd \$pkg
          
          # Sync dependencies, compile/repack, and skip PGK checks if necessary
          makepkg -s --noconfirm --needed
          
          # Copy the compiled package file back to our repository root folder
          cp *.pkg.tar.zst $GITHUB_WORKSPACE/
          
          cd ..
        done
        EOF

    - name: Update Pacman Repository Database
      run: |
        # Generate or update the repository database index 
        # using 'custom_repo' as our database name.
        repo-add custom_repo.db.tar.zst *.pkg.tar.zst

    - name: Deploy Compiled Repo to GitHub Pages Branch
      run: |
        # Configure git metadata using the standard GitHub actions bot profile
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Stage the new binary packages and the database tables
        git add *.pkg.tar.zst custom_repo.*
        
        # Commit and push back to main (which serves your Pages directory)
        git commit -m "Automated AUR Build: $(date +'%Y-%m-%d')" || exit 0
        git push origin main
